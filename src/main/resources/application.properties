spring.application.name=award-api

spring.datasource.url=jdbc:h2:mem:awarddb;DB_CLOSE_DELAY=-1
spring.datasource.driverClassName=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
# Schema is fully managed by schema.sql — Hibernate must not alter or validate it
spring.jpa.hibernate.ddl-auto=none

# Ensures schema.sql runs after the Hibernate bootstrap (no-op here), before @PostConstruct
spring.jpa.defer-datasource-initialization=true
spring.jpa.open-in-view=false
spring.jpa.properties.hibernate.jdbc.batch_size=50
spring.jpa.properties.hibernate.order_inserts=true

spring.sql.init.mode=always

spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

logging.level.com.outsera.award=INFO
